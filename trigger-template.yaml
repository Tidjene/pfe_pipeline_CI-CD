apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: trigger-template
  annotations:
    triggers.tekton.dev/old-escape-quotes: "true"
spec:
  params:
    - name: commits
      description: Les commits qui ont été poussés
    - name: gitRepository
      description: Le dépôt git
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: config-refresh-run-
        annotations:
          tekton.dev/gitURL: "$(tt.params.gitRepository)"
      spec:
        pipelineRef:
          name: config-refresh-pipeline
        params:
          - name: commits
            value: "$(tt.params.commits)"
          - name: filename
            value: "config.yaml"
          - name: urlToCurl
            value: https://api.hub.tekton.dev/categories
          - name: options
            value:
              ["-i", "-k", "-X", "GET"] #inclure les entetes,autoriser certificat non valide, et le methode GET